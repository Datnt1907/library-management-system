name: Server

on:
  push:
    branches: ["develop"]
  pull_request:
    types: [opened, synchronize, edited]

permissions:
  contents: read

jobs:
  changes:
    name: "Detect changes"
    runs-on: ubuntu-latest
    outputs:
      server: ${{ steps.filter.outputs.server }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            server:
              - 'server/**'
              - '.github/workflows/test_server.yaml'

  linters:
    name: "Server: Linters 📝"
    needs: changes
    if: needs.changes.outputs.server == 'true'
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "server/pyproject.toml"

      - name: 🔧 uv install
        working-directory: ./server
        run: uv sync --dev

      - name: 🐶 Lint Server (ruff)
        working-directory: ./server
        run: uv run task lint_check

  test:
    name: "Server: Tests 🐍"
    needs: changes
    if: needs.changes.outputs.server == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ENV: testing

    services:
      postgres:
        image: timescale/timescaledb:latest-pg15
        env:
          POSTGRES_USER: library
          POSTGRES_PASSWORD: library
          POSTGRES_DB: library_management_testing
          POSTGRES_PORT: 5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "server/pyproject.toml"

      - name: 🔧 uv install
        working-directory: ./server
        run: |
          uv sync --dev

      - name: ⚗️ alembic migrate
        working-directory: ./server
        run: uv run task db_migrate

      - name: ⚗️ alembic check
        working-directory: ./server
        run: uv run alembic check

      - name: 🐍 Run tests (pytest)
        working-directory: ./server
        run: uv run pytest -n auto --no-cov
